# Deploy with: npm run deploy:sync
# Must pass --config (see package.json). Plain `cd sync-endpoint && wrangler deploy`
# can walk up to the SPA wrangler.jsonc + .wrangler/deploy redirect and redeploy mydspv1.
name = "mydsp-sync"
main = "worker.js"
compatibility_date = "2026-07-01"

# After: npx wrangler kv namespace create mydsp-sync-kv
# paste the id below, then deploy.
[[kv_namespaces]]
binding = "STORE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# preview_id = "REPLACE_WITH_PREVIEW_KV_ID"  # optional for wrangler dev
