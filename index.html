<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="MyDSP — personal finance, built on the DSP Capital design system." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyDSP" />
    <meta name="application-name" content="MyDSP" />
    <meta name="theme-color" content="#F7931A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F7931A" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" />
    <title>MyDSP | Personal Finance</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mydsp_theme');
          var theme;
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          } else {
            // Auto (default): light during local daytime, dark after approximate sunset
            var now = new Date();
            var start = new Date(now.getFullYear(), 0, 0);
            var dayOfYear = Math.floor((now.getTime() - start.getTime()) / 86400000);
            var rad = ((dayOfYear - 81) / 365) * 2 * Math.PI;
            var sunrise = (6.5 - 0.75 * Math.sin(rad)) * 60;
            var sunset = (18.5 + 0.75 * Math.sin(rad)) * 60;
            var minutes = now.getHours() * 60 + now.getMinutes();
            theme = minutes >= sunrise && minutes < sunset ? 'light' : 'dark';
          }
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(theme);
        } catch (e) { /* private mode — keep html.dark */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="font-family:Inter,system-ui,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center">
        <div style="max-width:28rem">
          <div style="display:inline-block;background:#F7931A;color:#fff;padding:.5rem 1rem;margin-bottom:1.5rem;font-weight:700;letter-spacing:.05em">MyDSP</div>
          <p style="color:#9ca3af">JavaScript is required to run MyDSP.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
